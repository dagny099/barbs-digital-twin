name: Deploy to Hugging Face Spaces

# Triggers on every push to main.
# Syncs the app code and input data to the HF Space repo.
# The ChromaDB vector store is ephemeral on HF Spaces — see note at bottom.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone HF Space repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://dagny099:${HF_TOKEN}@huggingface.co/spaces/dagny099/my-digital-twin hf_space

      - name: Stage files for deployment
        run: |
          # ── Core app ──────────────────────────────────────────────────────
          cp app.py featured_projects.py utils.py db_sync.py requirements.txt SYSTEM_PROMPT.md hf_space/

          # ── Embedding scripts ─────────────────────────────────────────────
          # embed_kb_doc.py handles all kb_*.md files (replaces the old per-source scripts).
          cp scripts/ingest.py \
             scripts/embed_kb_doc.py \
             scripts/embed_project_summaries.py \
             scripts/embed_jekyll.py \
             scripts/embed_walkthroughs.py \
             hf_space/

          # ── Static assets (images, etc.) ──────────────────────────────────
          # project_diagrams/ PNGs are excluded — manage them directly on HF Space.
          rsync -a --exclude='project_diagrams/*.png' assets/ hf_space/assets/

          # ── Input data ────────────────────────────────────────────────────
          # Only the files the embed scripts actually need.
          # Intentionally excludes inputs/OLD/ (retired sources).
          mkdir -p hf_space/inputs
          cp inputs/kb_biosketch.md hf_space/inputs/
          cp inputs/kb_philosophy-and-approach.md hf_space/inputs/
          cp inputs/kb_professional_positioning.md hf_space/inputs/
          cp inputs/kb_projects.md hf_space/inputs/
          cp inputs/kb_career_narrative.md hf_space/inputs/
          cp inputs/kb_publications.md hf_space/inputs/
          cp -r inputs/project-summaries hf_space/inputs/

          # ── README.md is intentionally NOT copied ─────────────────────────
          # The HF Space README must keep its yaml frontmatter
          # (sdk: gradio, app_file: app.py, etc.) intact.
          # Edit it directly on HuggingFace if needed.

      - name: Commit and push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf_space
          git add -A

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Deploy from GitHub ${GITHUB_SHA::7}"
            git push https://dagny099:${HF_TOKEN}@huggingface.co/spaces/dagny099/my-digital-twin main
          fi

# ── ChromaDB on HF Spaces ────────────────────────────────────────────────────
# The .chroma_db_DT/ directory is ephemeral — wiped on container restart.
# app.py handles this automatically: on startup it attempts to pull the DB
# from HF Hub (db_sync.pull_db), and if the collection is still empty it
# runs `ingest.py --all` to rebuild from scratch.
