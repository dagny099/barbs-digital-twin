<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" width="840" height="480">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&amp;display=swap');
  text { font-family: 'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto">
    <path d="M0 0.5 L9 4 L0 7.5 Z" fill="#0D32B2"/>
  </marker>
</defs>

<rect width="840" height="480" fill="#FFFFFF" rx="12"/>

<!-- Title -->
<text x="420" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#0A0F25">Concept Cartographer — How it works</text>
<text x="420" y="54" text-anchor="middle" font-size="13" fill="#6B8A96">concept-cartographer.com · Chat → extract → graph, in one LLM call</text>

<!-- ═══ FLOW ROW ═══ -->
<rect x="28" y="76" width="170" height="108" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
<text x="113" y="112" text-anchor="middle" font-size="26">💬</text>
<text x="113" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0F25">Ask a question</text>
<text x="113" y="156" text-anchor="middle" font-size="11" fill="#1976d2">Pick a domain lens</text>
<text x="113" y="170" text-anchor="middle" font-size="11" fill="#1976d2">or type freely</text>

<line x1="198" y1="130" x2="230" y2="130" stroke="#0D32B2" stroke-width="2" marker-end="url(#ah)"/>

<rect x="234" y="76" width="170" height="108" rx="10" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
<text x="319" y="112" text-anchor="middle" font-size="26">⚡</text>
<text x="319" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0F25">Single LLM call</text>
<text x="319" y="156" text-anchor="middle" font-size="11" fill="#7b1fa2">Narrative + concepts +</text>
<text x="319" y="170" text-anchor="middle" font-size="11" fill="#7b1fa2">relationships in one shot</text>

<line x1="404" y1="130" x2="436" y2="130" stroke="#0D32B2" stroke-width="2" marker-end="url(#ah)"/>

<rect x="440" y="76" width="170" height="108" rx="10" fill="#e8f5e8" stroke="#388e3c" stroke-width="1.5"/>
<text x="525" y="112" text-anchor="middle" font-size="26">🕸️</text>
<text x="525" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0F25">Build the graph</text>
<text x="525" y="156" text-anchor="middle" font-size="11" fill="#388e3c">Nodes + edges accumulate</text>
<text x="525" y="170" text-anchor="middle" font-size="11" fill="#388e3c">across turns</text>

<line x1="610" y1="130" x2="642" y2="130" stroke="#0D32B2" stroke-width="2" marker-end="url(#ah)"/>

<rect x="646" y="76" width="166" height="108" rx="10" fill="#fffde7" stroke="#b28704" stroke-width="1.5"/>
<text x="729" y="112" text-anchor="middle" font-size="26">📤</text>
<text x="729" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0F25">Explore + export</text>
<text x="729" y="156" text-anchor="middle" font-size="11" fill="#b28704">Color-coded viz with</text>
<text x="729" y="170" text-anchor="middle" font-size="11" fill="#b28704">JSON &amp; PNG export</text>

<!-- ═══ FEATURE STRIP ═══ -->
<text x="420" y="214" text-anchor="middle" font-size="13" font-weight="600" fill="#0A0F25">Under the hood</text>

<rect x="28" y="228" width="192" height="82" rx="8" fill="#FFFFFF" stroke="#1976d2" stroke-width="1"/>
<text x="124" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#0A0F25">🎯 Domain lenses</text>
<text x="124" y="270" text-anchor="middle" font-size="11" fill="#1976d2">AI/ML · Cognitive Science</text>
<text x="124" y="284" text-anchor="middle" font-size="11" fill="#1976d2">Philosophy · Biology · more</text>
<text x="124" y="300" text-anchor="middle" font-size="10" fill="#6B8A96">Shapes extraction priorities</text>

<rect x="232" y="228" width="192" height="82" rx="8" fill="#FFFFFF" stroke="#7b1fa2" stroke-width="1"/>
<text x="328" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#0A0F25">⚡ Single-call design</text>
<text x="328" y="270" text-anchor="middle" font-size="11" fill="#7b1fa2">Structured JSON output:</text>
<text x="328" y="284" text-anchor="middle" font-size="11" fill="#7b1fa2">narrative + ontology</text>
<text x="328" y="300" text-anchor="middle" font-size="10" fill="#6B8A96">~50% faster than two-call</text>

<rect x="436" y="228" width="192" height="82" rx="8" fill="#FFFFFF" stroke="#388e3c" stroke-width="1"/>
<text x="532" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#0A0F25">🧬 Graph coherence</text>
<text x="532" y="270" text-anchor="middle" font-size="11" fill="#388e3c">Free growth up to 30 nodes</text>
<text x="532" y="284" text-anchor="middle" font-size="11" fill="#388e3c">then connectivity filter</text>
<text x="532" y="300" text-anchor="middle" font-size="10" fill="#6B8A96">No disconnected islands</text>

<rect x="640" y="228" width="172" height="82" rx="8" fill="#FFFFFF" stroke="#b28704" stroke-width="1"/>
<text x="726" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#0A0F25">💾 Stateful sessions</text>
<text x="726" y="270" text-anchor="middle" font-size="11" fill="#b28704">Graph persists across</text>
<text x="726" y="284" text-anchor="middle" font-size="11" fill="#b28704">conversation turns</text>
<text x="726" y="300" text-anchor="middle" font-size="10" fill="#6B8A96">First-turn caching for speed</text>

