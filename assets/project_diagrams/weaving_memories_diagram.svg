<text x="532" y="284" text-anchor="middle" font-size="11" fill="#388e3c">graph_builder.py populates</text>
<text x="532" y="300" text-anchor="middle" font-size="10" fill="#6B8A96">YAML → Neo4j with constraints</text>

<rect x="640" y="228" width="172" height="82" rx="8" fill="#FFFFFF" stroke="#1976d2" stroke-width="1"/>
