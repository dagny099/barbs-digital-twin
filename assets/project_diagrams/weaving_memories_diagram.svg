<text x="726" y="270" text-anchor="middle" font-size="11" fill="#1976d2">Timeline view + filters</text>
<text x="726" y="284" text-anchor="middle" font-size="11" fill="#1976d2">Legacy + network modes</text>
<text x="726" y="300" text-anchor="middle" font-size="10" fill="#6B8A96">Cypher-powered interactivity</text>

