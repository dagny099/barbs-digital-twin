<text x="124" y="300" text-anchor="middle" font-size="10" fill="#6B8A96">Temporal relationship patterns</text>

<rect x="232" y="228" width="192" height="82" rx="8" fill="#FFFFFF" stroke="#7b1fa2" stroke-width="1"/>
